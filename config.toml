[mediaTypes."application/atom+xml"]
  suffixes = ["xml"]
[outputFormats.Atom]
  name = "Atom"
  mediaType = "application/atom+xml"
  baseName = "atom"
  isPlainText = false
  rel = "alternate"
  isHTML = false
  noUgly = true
  permalinkable = false

[mediaTypes."application/rdf+xml"]
  suffixes = ["rdf"]
[outputFormats.Foaf]
  name = "FOAF"
  mediaType = "application/rdf+xml"
  baseName = "foaf"
  isPlainText = false
  rel = "alternate"
  isHTML = false
  noUgly = true
  permalinkable = false

[mediaTypes."text/plain"]
  suffixes = ["txt"]
[outputFormats.Humans]
  name = "Humans"
  mediaType = "text/plain"
  baseName = "humans"
  isPlainText = true
  rel = "alternate"
  isHTML = false
  noUgly = true
  permalinkable = false

# Generates /llms-full.txt — the documentation concatenated for LLMs (see
# layouts/_default/home.llms.txt). Add "LLMS" to a site's outputs.home to enable;
# pair it with a curated static/llms.txt link index.
[outputFormats.LLMS]
  name = "LLMS"
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  isHTML = false
  noUgly = true
  permalinkable = false
  notAlternative = true

# Generates /llms.txt — a concise, auto-derived link index (see
# layouts/_default/home.llmsindex.txt). Add "LLMSINDEX" to a site's outputs.home
# to enable; it derives from each page's front matter, so no static index is needed.
[outputFormats.LLMSINDEX]
  name = "LLMSINDEX"
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  isHTML = false
  noUgly = true
  permalinkable = false
  notAlternative = true
