<link href="{{ .Page.Permalink }}" rel="canonical">
<link href="{{ "/atom.xml" | absURL }}" rel="alternate" title="{{ .Site.Title }} Atom" type="application/atom+xml">
<link href="{{ "/index.xml" | absURL }}" rel="alternate" title="{{ .Site.Title }} RSS" type="application/rss+xml">
<link href="{{ "/sitemap.xml" | absURL }}" rel="sitemap" title="{{ .Site.Title }} Sitemap" type="application/xml">
<link rel="author" href="{{ "/humans.txt" | absURL }}" />
<link rel="alternate" type="application/rdf+xml" title="FOAF" href="{{ "/foaf.rdf" | absURL }}">
<link rel="license" href="https://creativecommons.org/publicdomain/zero/1.0/">
{{ if .Site.Params.favicons }}
<link rel="icon" href="{{ "/favicon.svg" | absURL }}" type="image/svg+xml">
<link rel="icon" href="{{ "/favicon.ico" | absURL }}" sizes="48x48 32x32 16x16">
<link rel="apple-touch-icon" href="{{ "/apple-touch-icon.png" | absURL }}">
{{ end }}
